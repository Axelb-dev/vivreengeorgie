      },
      {
        "@type": "Question",
        "name": "Les Français ont-ils besoin d'un visa pour vivre en Géorgie ?",
        "acceptedAnswer": {
          "@type": "Answer",

        }
      },
      {
        "@type": "Question",
        "name": "Quel est le coût de la vie en Géorgie comparé à la France ?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Le coût de la vie en Géorgie est 3 à 5 fois inférieur à celui de la France. Un appartement deux pièces à Batumi se loue entre 350 et 550€/mois, un repas au restaurant coûte 6 à 12€ et la fibre optique revient à 12-18€/mois."
        }
      },

        "@type": "Question",

          "@type": "Answer",

function toggleFaq(btn) {
  var item = btn.closest('.faq-item');
  var isOpen = item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(function(el) {
    el.classList.remove('open');
    el.querySelector('.faq-q').setAttribute('aria-expanded', 'false');
  });
  if (!isOpen) {
    item.classList.add('open');
    btn.setAttribute('aria-expanded', 'true');
  }
}
